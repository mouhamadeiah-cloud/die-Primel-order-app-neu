<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Die Primel order App</title>
    <style>
        /* جميع الأنماط كما هي - لم تتغير */
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        :root {
            --primary-green: #2d6a4f;
            --primary-gold: #d4a373;
            --light-bg: #fefae0;
            --price-visible: #b4430c;
            --price-hidden: #f5f5f5;
            --danger: #c1121f;
            --success: #2b9348;
        }
        .app-header {
            background: var(--primary-green);
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .hamburger { font-size:28px; cursor:pointer; background:none; border:none; color:white; width:40px; }
        .app-title { font-size:1.6rem; font-weight:bold; flex-grow:1; cursor:pointer; }
        .side-menu {
            position: fixed; top:0; left:-280px; width:260px; height:100%; background:white;
            box-shadow:2px 0 12px rgba(0,0,0,0.2); z-index:200; transition:0.3s;
            padding-top:70px; padding-left:20px;
        }
        .side-menu a { display:block; font-size:1.3rem; text-decoration:none; color:var(--primary-green); padding:12px; font-weight:bold; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:150; display:none; }
        .main-layout { display:flex; flex:1; overflow:hidden; gap:2px; }
        .left-panel { width:70%; background:var(--light-bg); overflow-y:auto; padding:8px; }
        .right-panel { width:30%; background:white; border-left:2px solid var(--primary-gold); display:flex; flex-direction:column; overflow:hidden; padding:8px; }
        .dual-btn { display:flex; gap:8px; margin-bottom:15px; }
        .btn-half { flex:1; background:var(--primary-green); color:white; border:none; padding:14px; border-radius:40px; font-weight:bold; cursor:pointer; }
        .dropdown {
            background:white; border-radius:20px; box-shadow:0 8px 20px rgba(0,0,0,0.2);
            margin-bottom:15px; max-height:70vh; overflow-y:auto; display:none;
        }
        .dropdown-item { padding:12px 16px; border-bottom:1px solid #ddd; display:flex; align-items:center; gap:12px; cursor:pointer; }
        .dropdown-item img { width:40px; height:40px; border-radius:20px; object-fit:cover; }
        .items-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:12px; }
        .item-card { background:white; border-radius:20px; overflow:hidden; cursor:pointer; text-align:center; padding-bottom:8px; }
        .item-card img { width:100%; height:120px; object-fit:cover; }
        .item-name { font-weight:bold; margin-top:6px; }
        .item-price { font-weight:bold; margin:4px 0; transition:color 0.2s; }
        .price-hidden { color:var(--price-hidden); }
        .price-visible { color:var(--price-visible); }
        .cart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
        .cart-scroll-area { flex:1; overflow-y:auto; margin-bottom:8px; }
        .cart-item {
            background:#f9f9f9; border-radius:16px; padding:8px; margin-bottom:8px;
            display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;
        }
        .cart-item.inactive { opacity:0.6; background:#e9ecef; }
        .cart-item-info { flex:1; }
        .cart-item-actions { display:flex; gap:8px; align-items:center; }
        .toggle-active-btn {
            background: var(--success);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .toggle-active-btn.deactivate { background: #6c757d; }
        .delete-item { background:var(--danger); color:white; border:none; border-radius:30px; padding:6px 12px; cursor:pointer; }
        .extra-badge {
            font-size:0.75rem;
            background:#e0f2fe;
            display:inline-block;
            padding:2px 8px;
            border-radius:20px;
            margin-right:5px;
        }
        .price-modifier-badge {
            font-size:0.75rem;
            background:#d4a373;
            display:inline-block;
            padding:2px 8px;
            border-radius:20px;
            margin-right:5px;
            font-weight:bold;
        }
        .total { font-size:1.5rem; font-weight:bold; text-align:right; margin:8px 0; border-top:1px solid #ccc; padding-top:8px; }
        .cart-actions-bottom {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .cart-actions-bottom button {
            flex: 1;
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 8px 4px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem;
            white-space: nowrap;
        }
        .clear-all { background: #6c757d; }
        .transfer-btn, .save-changes-btn { background: var(--primary-gold); color: #2d2d2d; }
        .cancel-table-btn { background: #c1121f; color: white; }
        .activate-all-btn { background: var(--primary-gold); border: none; border-radius: 30px; padding: 4px 12px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            display: none;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 600px;
            border-radius: 32px;
            padding: 28px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--primary-gold);
        }
        .modal-header h3 {
            font-size: 1.6rem;
            color: var(--primary-green);
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 32px;
            cursor: pointer;
            color: #666;
            padding: 0 10px;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border-radius: 30px;
            border: 1px solid #ccc;
            font-size: 1rem;
            background: #f9f9f9;
        }
        .modal-content input:focus, .modal-content textarea:focus {
            outline: none;
            border-color: var(--primary-green);
        }
        .modal-content textarea {
            min-height: 80px;
            resize: vertical;
        }
        .selected-items-list {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 12px;
            margin: 12px 0;
            max-height: 150px;
            overflow-y: auto;
        }
        .selected-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            background: white;
            border-radius: 30px;
            margin-bottom: 6px;
        }
        .selected-item span {
            font-size: 0.85rem;
        }
        .remove-selected {
            background: #c1121f;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 2px 10px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .option-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .option-item {
            background: #f0f0f0;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
        }
        .option-item:hover { background: #e0e0e0; }
        .option-item img {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            object-fit: cover;
            margin-bottom: 8px;
        }
        .option-info {
            font-weight: bold;
            font-size: 0.9rem;
        }
        .option-price {
            font-size: 0.8rem;
            color: var(--price-visible);
            margin-top: 4px;
        }
        @media (max-width: 600px) {
            .option-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            }
            .option-item img { width: 50px; height: 50px; }
            .btn-half { font-size:1rem; padding:10px; }
            .cart-actions-bottom button { font-size:0.6rem; padding:6px 2px; }
            .modal-content { padding: 20px; }
            .modal-header h3 { font-size: 1.3rem; }
        }
        .table-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:15px; margin:20px 0; }
        .table-btn { background:var(--primary-gold); padding:18px 0; text-align:center; font-weight:bold; font-size:1.3rem; border-radius:50px; cursor:pointer; }
        .table-disabled { background:#aaa; pointer-events:none; opacity:0.6; }
        .takeaway-btn { background:var(--primary-green); width:100%; padding:14px; border-radius:50px; font-size:1.2rem; margin-top:10px; }
        .toast {
            position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
            background:#333; color:white; padding:10px 20px; border-radius:40px;
            z-index:400; opacity:0; transition:opacity 0.3s; pointer-events:none;
        }
        .toast.show { opacity:1; }
    </style>
</head>
<body>
<div class="app-header">
    <button class="hamburger" id="hamburgerBtn">☰</button>
    <div class="app-title" id="appTitle">Die Primel</div>
    <div style="width:40px;"></div>
</div>
<div class="overlay" id="overlay"></div>
<div class="side-menu" id="sideMenu">
    <a href="#" data-page="kueche">Küche</a>
    <a href="#" data-page="online">Online</a>
    <a href="#" data-page="admin">Admin</a>
    <a href="kunden_display.html" data-page="kunden">Kunden display</a>
</div>

<div class="main-layout">
    <div class="left-panel">
        <div class="dual-btn">
            <button class="btn-half" id="groupsBtn">📋 Gruppen</button>
            <button class="btn-half" id="tablesBtn">🪑 Tische</button>
        </div>
        <div id="selectedGroupTitle" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; padding: 0 8px; color: var(--primary-green);"></div>
        <div id="groupDropdown" class="dropdown"></div>
        <div id="tablesDropdown" class="dropdown"></div>
        <div id="itemsContainer" class="items-grid"></div>
    </div>
    <div class="right-panel">
        <div class="cart-header">
            <h3 id="cartTitle">Warenkorb</h3>
            <button id="activateAllBtn" class="activate-all-btn" style="display: none;">Alle aktivieren</button>
        </div>
        <div id="cartScroll" class="cart-scroll-area"><div id="cartList"></div></div>
        <div id="totalAmount" class="total"></div>
        <div class="cart-actions-bottom" id="allActions">
            <button id="sendOrderBtn">📨 Bestellung senden</button>
            <button id="clearCartBtn" class="clear-all">🗑 Alles löschen</button>
            <button id="transferTableBtn" class="transfer-btn" style="display:none;">🔄 Tisch wechseln</button>
            <button id="cancelTableBtn" class="cancel-table-btn" style="display:none;">❌ Tisch aufheben</button>
            <button id="saveTableChangesBtn" class="save-changes-btn" style="display:none;">💾 Änderungen speichern</button>
        </div>
    </div>
</div>

<!-- Modals -->
<div id="itemModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalItemName"></h3>
            <button class="close-modal" id="closeItemModalBtn">&times;</button>
        </div>
        <div style="margin-bottom: 12px;">
            <label style="font-weight: bold;">Originalpreis:</label>
            <span id="originalPriceDisplay" style="margin-left: 10px; color: var(--primary-green);"></span>
            <span id="priceDiffDisplay" style="margin-left: 10px; font-weight: bold;"></span>
        </div>
        <input type="number" id="modalPrice" step="0.5" placeholder="Neuen Preis eingeben">
        <textarea id="modalText" rows="2" placeholder="Sonderwünsche (rot)"></textarea>
        <div id="selectedExtrasDisplay" class="selected-items-list" style="display: none;"></div>
        <div id="selectedZutatenDisplay" class="selected-items-list" style="display: none;"></div>
        <div style="display: flex; gap: 12px; margin: 12px 0;">
            <button id="addExtrasBtn" style="flex:1; background: var(--primary-gold); color: #2d2d2d; padding: 12px; border-radius: 40px; font-weight: bold;">➕ Extras</button>
            <button id="addZutatenBtn" style="flex:1; background: var(--primary-gold); color: #2d2d2d; padding: 12px; border-radius: 40px; font-weight: bold;">🧂 Zutaten</button>
        </div>
        <button id="saveItemChangesBtn" style="width:100%; padding: 14px; background: var(--primary-green); color: white; border: none; border-radius: 40px; font-weight: bold; font-size: 1rem;">Speichern</button>
    </div>
</div>
<div id="extrasModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Extras</h3><button class="close-modal" id="closeExtrasModalBtn">&times;</button></div><div id="extrasList" class="option-grid"></div></div></div>
<div id="zutatenModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Zutaten</h3><button class="close-modal" id="closeZutatenModalBtn">&times;</button></div><div id="zutatenList" class="option-grid"></div></div></div>
<div id="tablesSelectionModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Tisch wählen</h3><button class="close-modal" id="closeTablesModalBtn">&times;</button></div><div id="tablesGrid" class="table-grid"></div><button id="takeawayBtn" class="takeaway-btn">🥡 Takeaway</button></div></div>
<div id="toastMsg" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyAEupmyQlU5MK_tRDIlJpjwryKU0nHpjQk",
        authDomain: "die-primel-orderapp.firebaseapp.com",
        databaseURL: "https://die-primel-orderapp-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "die-primel-orderapp",
        storageBucket: "die-primel-orderapp.firebasestorage.app",
        messagingSenderId: "781155000962",
        appId: "1:781155000962:web:93f9a6aa03d4e77d358a9b"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // ========== Globale Variablen ==========
    let allGroups = [];
    let currentGroupId = null;
    let currentProducts = [];
    let cart = [];
    let showPrices = false;
    let priceTimeout = null;
    let occupiedTables = new Set();
    let currentSelectedTable = null;
    
    // ========== قراءة معامل table من الرابط ==========
    const urlParams = new URLSearchParams(window.location.search);
    const tableFromUrl = urlParams.get('table');
    if (tableFromUrl && !isNaN(parseInt(tableFromUrl))) {
        setTimeout(async () => {
            if (typeof selectOccupiedTable === 'function') {
                await selectOccupiedTable(parseInt(tableFromUrl));
            }
        }, 800);
    }
    
    // ========== Hilfsfunktionen ==========
    function showToast(msg, isErr = false) {
        const toast = document.getElementById("toastMsg");
        toast.textContent = msg;
        toast.style.background = isErr ? "#c1121f" : "#2d6a4f";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2500);
    }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function cleanForFirebase(obj) {
        return JSON.parse(JSON.stringify(obj, (key, value) => (value === undefined ? null : value)));
    }
    
    // حفظ السلة في Firebase لاستخدامها في Kunden Display
    async function saveCartToFirebase() {
        await set(ref(db, 'cart/current'), cart);
    }
    
    async function getNextOrderNumber() {
        const today = new Date().toISOString().slice(0,10);
        const counterRef = ref(db, `counters/orders/${today}`);
        const snapshot = await get(counterRef);
        let currentNumber = snapshot.val() || 99;
        const nextNumber = currentNumber + 1;
        await set(counterRef, nextNumber);
        return nextNumber;
    }
    
    document.querySelectorAll(".modal").forEach(modal => {
        modal.addEventListener("click", (e) => {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        });
    });
    
    const titleEl = document.getElementById("appTitle");
    titleEl.addEventListener("dblclick", async () => {
        showPrices = true;
        applyPriceVisibility();
        // إرسال إشارة إلى Kunden Display
        await set(ref(db, 'settings/showPricesForKunden'), true);
        if(priceTimeout) clearTimeout(priceTimeout);
        priceTimeout = setTimeout(() => { showPrices = false; applyPriceVisibility(); }, 60000);
    });
    function applyPriceVisibility() {
        document.querySelectorAll(".item-price, .cart-item-price, .total, .option-price").forEach(el => {
            if(showPrices) {
                el.classList.remove("price-hidden");
                el.classList.add("price-visible");
            } else {
                el.classList.remove("price-visible");
                el.classList.add("price-hidden");
            }
        });
        renderCart();
    }
    
    const groupsRef = ref(db, 'groups');
    onValue(groupsRef, (snapshot) => {
        const data = snapshot.val();
        allGroups = data ? Object.entries(data).map(([id,val]) => ({ id, ...val })).sort((a,b)=> (a.order||0)-(b.order||0)) : [];
        renderGroupDropdown();
        if(allGroups.length && !currentGroupId) {
            currentGroupId = allGroups[0].id;
            loadProducts(currentGroupId);
        }
    });
    function renderGroupDropdown() {
        const container = document.getElementById("groupDropdown");
        container.innerHTML = allGroups.map(g => `
            <div class="dropdown-item" data-id="${g.id}">
                ${g.imageUrl ? `<img src="${g.imageUrl}" onerror="this.style.display='none'">` : '<div style="width:40px;"></div>'}
                <span>${g.name}</span>
            </div>
        `).join('');
        document.querySelectorAll("#groupDropdown .dropdown-item").forEach(div => {
            div.addEventListener("click", (e) => {
                e.stopPropagation();
                currentGroupId = div.dataset.id;
                loadProducts(currentGroupId);
                document.getElementById("groupDropdown").style.display = "none";
            });
        });
    }
    async function loadProducts(groupId) {
        const productsRef = ref(db, 'products');
        const snapshot = await get(productsRef);
        const data = snapshot.val();
        if(data) {
            currentProducts = Object.entries(data).map(([id,val]) => ({ id, ...val })).filter(p => p.groupId === groupId).sort((a,b)=> (a.order||0)-(b.order||0));
        } else currentProducts = [];
        renderItems();
        const groupName = allGroups.find(g => g.id === groupId)?.name || "";
        document.getElementById("selectedGroupTitle").innerText = groupName ? `📁 ${groupName}` : "";
    }
    function renderItems() {
        const container = document.getElementById("itemsContainer");
        container.innerHTML = currentProducts.map(p => `
            <div class="item-card" data-id="${p.id}">
                <img src="${p.imageUrl || 'https://via.placeholder.com/140'}" onerror="this.src='https://via.placeholder.com/140'">
                <div class="item-name">${p.name}</div>
                <div class="item-price ${showPrices ? 'price-visible' : 'price-hidden'}">${showPrices ? (parseFloat(p.price)||0).toFixed(2)+' €' : ''}</div>
            </div>
        `).join('');
        document.querySelectorAll("#itemsContainer .item-card").forEach(card => {
            card.addEventListener("click", () => {
                const id = card.dataset.id;
                const prod = currentProducts.find(p => p.id == id);
                if(prod) addNewProductToCart(prod);
            });
        });
        const groupName = allGroups.find(g => g.id === currentGroupId)?.name || "";
        document.getElementById("selectedGroupTitle").innerText = groupName ? `📁 ${groupName}` : "";
    }
    
    function addNewProductToCart(product) {
        if (!Array.isArray(cart)) cart = [];
        const basePrice = parseFloat(product.price) || 0;
        cart.push({
            id: Date.now() + Math.random(),
            productId: product.id,
            name: product.name,
            basePrice: basePrice,
            customText: "",
            extras: [],
            zutaten: [],
            priceModifier: 0,
            totalPrice: basePrice,
            imageUrl: product.imageUrl,
            active: true,
            isOldItem: false
        });
        renderCart();
    }
    
    function loadTableIntoCart(tableItems) {
        if (!Array.isArray(tableItems)) tableItems = [];
        cart = tableItems.map(it => {
            let price = 0;
            if (it.totalPrice !== undefined && it.totalPrice !== null) price = parseFloat(it.totalPrice);
            else if (it.basePrice !== undefined && it.basePrice !== null) price = parseFloat(it.basePrice);
            else if (it.price !== undefined && it.price !== null) price = parseFloat(it.price);
            if (isNaN(price)) price = 0;
            return {
                id: Date.now() + Math.random(),
                productId: it.productId || it.id || "old",
                name: it.name,
                basePrice: price,
                customText: it.customText || "",
                extras: Array.isArray(it.extras) ? it.extras : [],
                zutaten: Array.isArray(it.zutaten) ? it.zutaten : [],
                priceModifier: it.priceModifier || 0,
                totalPrice: price + (it.priceModifier || 0),
                imageUrl: it.imageUrl,
                active: false,
                isOldItem: true
            };
        });
        renderCart();
    }
    
    function renderCart() {
        if (!Array.isArray(cart)) cart = [];
        const container = document.getElementById("cartList");
        if(!cart.length) {
            container.innerHTML = "<p>Leer</p>";
            document.getElementById("totalAmount").innerHTML = "";
            saveCartToFirebase();
            return;
        }
        let html = '', total = 0;
        cart.forEach((item, idx) => {
            let itemTotal = 0;
            if(item.active) {
                let extrasTotal = (item.extras || []).reduce((s,e)=>s+(parseFloat(e.price)||0),0);
                let zutatenTotal = (item.zutaten || []).reduce((s,z)=>s+(parseFloat(z.price)||0),0);
                itemTotal = (item.basePrice || 0) + (item.priceModifier || 0) + extrasTotal + zutatenTotal;
                item.totalPrice = itemTotal;
                total += itemTotal;
            }
            const activeClass = item.active ? '' : 'inactive';
            const toggleBtnText = item.active ? 'Deaktivieren' : 'Aktivieren';
            const toggleBtnClass = item.active ? 'toggle-active-btn deactivate' : 'toggle-active-btn';
            
            let priceModifierHtml = '';
            if (item.priceModifier && item.priceModifier !== 0) {
                const modifierText = item.priceModifier > 0 ? `Preiserhöhung +${item.priceModifier.toFixed(2)}€` : `Preisrabatt ${item.priceModifier.toFixed(2)}€`;
                priceModifierHtml = `<div><span class="price-modifier-badge">${modifierText}</span></div>`;
            }
            
            html += `<div class="cart-item ${activeClass}" data-index="${idx}">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${escapeHtml(item.name)}</div>
                            <div class="cart-item-price ${showPrices && item.active ? 'price-visible' : 'price-hidden'}">${(showPrices && item.active) ? itemTotal.toFixed(2)+' €' : ''}</div>
                            ${(item.customText && item.active) ? `<div style="color:red;">${escapeHtml(item.customText)}</div>` : ''}
                            ${priceModifierHtml}
                            ${(item.extras || []).map(ex => `<div><span class="extra-badge">${escapeHtml(ex.name)} +${(parseFloat(ex.price)||0).toFixed(2)}€</span></div>`).join('')}
                            ${(item.zutaten || []).map(z => `<div><span class="extra-badge">${escapeHtml(z.name)} +${(parseFloat(z.price)||0).toFixed(2)}€</span></div>`).join('')}
                        </div>
                        <div class="cart-item-actions">
                            ${item.isOldItem ? `<button class="${toggleBtnClass}" data-idx="${idx}">${toggleBtnText}</button>` : ''}
                            <button class="delete-item" data-idx="${idx}">Löschen</button>
                        </div>
                    </div>`;
        });
        container.innerHTML = html;
        document.getElementById("totalAmount").innerHTML = showPrices ? total.toFixed(2)+' €' : '';
        
        document.querySelectorAll(".toggle-active-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                let idx = parseInt(btn.dataset.idx);
                if (cart[idx]) {
                    cart[idx].active = !cart[idx].active;
                    renderCart();
                }
            });
        });
        document.querySelectorAll(".delete-item").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                let idx = parseInt(btn.dataset.idx);
                if (cart[idx] && cart[idx].active) {
                    cart.splice(idx,1);
                    renderCart();
                } else {
                    showToast("Inaktive Elemente können nicht gelöscht werden", true);
                }
            });
        });
        document.querySelectorAll(".cart-item").forEach(el => {
            el.addEventListener("click", (e) => {
                if(e.target.classList.contains('delete-item') || e.target.classList.contains('toggle-active-btn')) return;
                let idx = parseInt(el.dataset.index);
                if (cart[idx] && cart[idx].active) openItemModal(idx);
                else showToast("Bitte aktivieren Sie zuerst das Element", true);
            });
        });
        saveCartToFirebase();
    }
    
    let currentEditIndex = null;
    
    function renderSelectedExtras(item) {
        const container = document.getElementById("selectedExtrasDisplay");
        if (item.extras && item.extras.length > 0) {
            container.style.display = "block";
            container.innerHTML = `<div style="font-weight: bold; margin-bottom: 6px;">📌 Extras:</div>` +
                item.extras.map((ex, idx) => `
                    <div class="selected-item">
                        <span>${escapeHtml(ex.name)} +${ex.price.toFixed(2)}€</span>
                        <button class="remove-selected" data-type="extras" data-idx="${idx}">✖</button>
                    </div>
                `).join('');
            container.querySelectorAll(".remove-selected").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const type = btn.dataset.type;
                    const idx = parseInt(btn.dataset.idx);
                    if (type === "extras") item.extras.splice(idx, 1);
                    if (type === "zutaten") item.zutaten.splice(idx, 1);
                    renderSelectedExtras(item);
                    renderSelectedZutaten(item);
                    renderCart();
                });
            });
        } else {
            container.style.display = "none";
        }
    }
    
    function renderSelectedZutaten(item) {
        const container = document.getElementById("selectedZutatenDisplay");
        if (item.zutaten && item.zutaten.length > 0) {
            container.style.display = "block";
            container.innerHTML = `<div style="font-weight: bold; margin-bottom: 6px;">🥗 Zutaten:</div>` +
                item.zutaten.map((z, idx) => `
                    <div class="selected-item">
                        <span>${escapeHtml(z.name)} +${z.price.toFixed(2)}€</span>
                        <button class="remove-selected" data-type="zutaten" data-idx="${idx}">✖</button>
                    </div>
                `).join('');
            container.querySelectorAll(".remove-selected").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const type = btn.dataset.type;
                    const idx = parseInt(btn.dataset.idx);
                    if (type === "extras") item.extras.splice(idx, 1);
                    if (type === "zutaten") item.zutaten.splice(idx, 1);
                    renderSelectedExtras(item);
                    renderSelectedZutaten(item);
                    renderCart();
                });
            });
        } else {
            container.style.display = "none";
        }
    }
    
    function openItemModal(index) {
        currentEditIndex = index;
        const item = cart[index];
        if (!item) return;
        document.getElementById("modalItemName").innerText = item.name;
        
        const originalPrice = item.basePrice;
        const currentModifier = item.priceModifier || 0;
        const currentTotal = originalPrice + currentModifier;
        document.getElementById("originalPriceDisplay").innerText = originalPrice.toFixed(2) + " €";
        document.getElementById("modalPrice").value = currentTotal;
        if (currentModifier !== 0) {
            const diffText = currentModifier > 0 ? `+ ${currentModifier.toFixed(2)} €` : `- ${Math.abs(currentModifier).toFixed(2)} €`;
            document.getElementById("priceDiffDisplay").innerText = diffText;
            document.getElementById("priceDiffDisplay").style.color = currentModifier > 0 ? "#b4430c" : "#2d6a4f";
        } else {
            document.getElementById("priceDiffDisplay").innerText = "";
        }
        
        document.getElementById("modalText").value = item.customText || "";
        renderSelectedExtras(item);
        renderSelectedZutaten(item);
        document.getElementById("itemModal").style.display = "flex";
    }
    
    document.getElementById("saveItemChangesBtn").onclick = () => {
        if(currentEditIndex !== null && cart[currentEditIndex] && cart[currentEditIndex].active) {
            const item = cart[currentEditIndex];
            const newTotalPrice = parseFloat(document.getElementById("modalPrice").value);
            if (!isNaN(newTotalPrice) && newTotalPrice >= 0) {
                const newModifier = newTotalPrice - item.basePrice;
                const oldModifier = item.priceModifier || 0;
                const diff = newModifier - oldModifier;
                item.priceModifier = newModifier;
                showToast(`Preis geändert: ${diff > 0 ? '+' : ''}${diff.toFixed(2)} €`);
            }
            item.customText = document.getElementById("modalText").value;
            renderCart();
            closeAllModals();
        }
    };
    
    async function openExtrasModal(item) {
        if(!item.active) { showToast("Element ist inaktiv"); return; }
        const snapshot = await get(ref(db, 'extras'));
        const extras = snapshot.val() ? Object.values(snapshot.val()) : [];
        const container = document.getElementById("extrasList");
        container.innerHTML = extras.map(ex => `
            <div class="option-item" data-name="${ex.name}" data-price="${ex.price}" data-img="${ex.imageUrl || ''}">
                <img src="${ex.imageUrl || 'https://via.placeholder.com/60'}" onerror="this.src='https://via.placeholder.com/60'">
                <div class="option-info">${ex.name}</div>
                <div class="option-price ${showPrices ? 'price-visible' : 'price-hidden'}">${showPrices ? '+'+((parseFloat(ex.price)||0).toFixed(2))+'€' : ''}</div>
            </div>
        `).join('');
        document.getElementById("extrasModal").style.display = "flex";
        document.querySelectorAll(".option-item").forEach(div => {
            div.addEventListener("click", () => {
                const name = div.dataset.name;
                const price = parseFloat(div.dataset.price);
                if (!item.extras) item.extras = [];
                item.extras.push({ name, price });
                renderSelectedExtras(item);
                renderCart();
                showToast(`"${name}" hinzugefügt`);
            });
        });
    }
    
    async function openZutatenModal(item) {
        if(!item.active) { showToast("Element ist inaktiv"); return; }
        const snapshot = await get(ref(db, 'zutaten'));
        const zutaten = snapshot.val() ? Object.values(snapshot.val()) : [];
        const container = document.getElementById("zutatenList");
        container.innerHTML = zutaten.map(z => `
            <div class="option-item" data-name="${z.name}" data-price="${z.price}" data-img="${z.imageUrl || ''}">
                <img src="${z.imageUrl || 'https://via.placeholder.com/60'}" onerror="this.src='https://via.placeholder.com/60'">
                <div class="option-info">${z.name}</div>
                <div class="option-price ${showPrices ? 'price-visible' : 'price-hidden'}">${showPrices ? '+'+((parseFloat(z.price)||0).toFixed(2))+'€' : ''}</div>
            </div>
        `).join('');
        document.getElementById("zutatenModal").style.display = "flex";
        document.querySelectorAll(".option-item").forEach(div => {
            div.addEventListener("click", () => {
                const name = div.dataset.name;
                const price = parseFloat(div.dataset.price);
                if (!item.zutaten) item.zutaten = [];
                item.zutaten.push({ name, price });
                renderSelectedZutaten(item);
                renderCart();
                showToast(`"${name}" hinzugefügt`);
            });
        });
    }
    
    document.getElementById("addExtrasBtn").onclick = () => { if(currentEditIndex !== null) openExtrasModal(cart[currentEditIndex]); };
    document.getElementById("addZutatenBtn").onclick = () => { if(currentEditIndex !== null) openZutatenModal(cart[currentEditIndex]); };
    
    function closeAllModals() { 
        document.querySelectorAll(".modal").forEach(m => m.style.display = "none"); 
    }
    
    document.getElementById("closeItemModalBtn").onclick = closeAllModals;
    document.getElementById("closeExtrasModalBtn").onclick = () => {
        document.getElementById("extrasModal").style.display = "none";
    };
    document.getElementById("closeZutatenModalBtn").onclick = () => {
        document.getElementById("zutatenModal").style.display = "none";
    };
    document.getElementById("closeTablesModalBtn").onclick = closeAllModals;
    
    function activateAllOldItems() {
        cart.forEach(item => { if(item.isOldItem && !item.active) item.active = true; });
        renderCart();
        showToast("Alle alten Elemente aktiviert");
    }
    document.getElementById("activateAllBtn").onclick = activateAllOldItems;
    
    async function loadOccupiedTablesForDropdown() {
        const snapshot = await get(ref(db, 'orders'));
        const data = snapshot.val();
        const active = new Set();
        if(data) {
            Object.values(data).forEach(order => {
                let t = order.table;
                if(t !== "takeaway" && !isNaN(parseInt(t)) && order.status !== "completed") active.add(parseInt(t));
            });
        }
        return Array.from(active).sort((a,b)=>a-b);
    }
    async function renderTablesDropdown() {
        const activeList = await loadOccupiedTablesForDropdown();
        const container = document.getElementById("tablesDropdown");
        if(activeList.length === 0) container.innerHTML = `<div class="dropdown-item">Keine belegten Tische</div>`;
        else {
            container.innerHTML = activeList.map(t => `<div class="dropdown-item" data-table="${t}">Tisch ${t}</div>`).join('');
            document.querySelectorAll("#tablesDropdown .dropdown-item").forEach(div => {
                div.addEventListener("click", async (e) => {
                    e.stopPropagation();
                    const tableNum = parseInt(div.dataset.table);
                    await selectOccupiedTable(tableNum);
                    document.getElementById("tablesDropdown").style.display = "none";
                });
            });
        }
    }
    
    async function selectOccupiedTable(tableNum) {
        if(currentSelectedTable !== null) {
            if(!confirm("Möchten Sie die aktuelle Tabellenansicht verlassen? Nicht gespeicherte Änderungen gehen verloren.")) return;
        }
        const stateRef = ref(db, `tableStates/${tableNum}`);
        const stateSnap = await get(stateRef);
        if(stateSnap.exists() && stateSnap.val().items && Array.isArray(stateSnap.val().items)) {
            cart = stateSnap.val().items.map(item => ({ ...item, id: Date.now() + Math.random(), active: false }));
            currentSelectedTable = tableNum;
            updateUITableMode(true, tableNum);
            renderCart();
            showToast(`Tisch ${tableNum} geladen (gespeicherter Zustand). Alle Elemente sind inaktiv.`);
            return;
        }
        const snapshot = await get(ref(db, 'orders'));
        const data = snapshot.val();
        let allItems = [];
        if(data) {
            for(let [id, order] of Object.entries(data)) {
                if(order.table == tableNum && order.status !== "completed") {
                    if(order.items && Array.isArray(order.items)) allItems.push(...order.items);
                }
            }
        }
        loadTableIntoCart(allItems);
        currentSelectedTable = tableNum;
        updateUITableMode(true, tableNum);
        showToast(`Tisch ${tableNum} geladen. Alte Elemente sind inaktiv.`);
    }
    
    function updateUITableMode(isTableMode, tableNum = null) {
        const sendBtn = document.getElementById("sendOrderBtn");
        const clearBtn = document.getElementById("clearCartBtn");
        const transferBtn = document.getElementById("transferTableBtn");
        const cancelBtn = document.getElementById("cancelTableBtn");
        const saveBtn = document.getElementById("saveTableChangesBtn");
        const activateAllBtn = document.getElementById("activateAllBtn");
        const cartTitle = document.getElementById("cartTitle");
        if(isTableMode) {
            sendBtn.style.display = "block";
            clearBtn.style.display = "block";
            transferBtn.style.display = "block";
            cancelBtn.style.display = "block";
            saveBtn.style.display = "block";
            activateAllBtn.style.display = "block";
            cartTitle.innerText = `Tisch ${tableNum}`;
        } else {
            sendBtn.style.display = "block";
            clearBtn.style.display = "block";
            transferBtn.style.display = "none";
            cancelBtn.style.display = "none";
            saveBtn.style.display = "none";
            activateAllBtn.style.display = "none";
            cartTitle.innerText = "Warenkorb";
            currentSelectedTable = null;
            cart = [];
            renderCart();
        }
    }
    
    function exitTableMode(resetCart = true) {
        if(resetCart) cart = [];
        renderCart();
        updateUITableMode(false);
        showToast("Tabellenmodus beendet");
    }
    
    document.getElementById("clearCartBtn").onclick = () => {
        if(currentSelectedTable) {
            cart = cart.filter(item => !item.active);
            renderCart();
            showToast("Aktive Elemente gelöscht");
            exitTableMode(true);
        } else {
            cart = [];
            renderCart();
            showToast("Alles gelöscht");
        }
    };
    
    document.getElementById("sendOrderBtn").onclick = async () => {
        if(currentSelectedTable) {
            const activeItems = cart.filter(item => item.active);
            if(activeItems.length === 0) { showToast("Keine aktiven Elemente zum Senden", true); return; }
            
            const orderNumber = await getNextOrderNumber();
            
            const cleanItems = activeItems.map(item => ({
                name: item.name,
                basePrice: item.basePrice,
                totalPrice: item.totalPrice,
                priceModifier: item.priceModifier || 0,
                customText: item.customText || "",
                extras: Array.isArray(item.extras) ? item.extras : [],
                zutaten: Array.isArray(item.zutaten) ? item.zutaten : [],
                status: "new"
            }));
            const order = {
                table: currentSelectedTable,
                items: cleanItems,
                timestamp: Date.now(),
                status: "new",
                orderNumber: orderNumber
            };
            const cleanedOrder = cleanForFirebase(order);
            const newOrderRef = push(ref(db, 'orders'));
            await set(newOrderRef, cleanedOrder);
            // 🔔 إشارة الجرس
            await set(ref(db, 'sounds/ring'), true);
            showToast(`Neue Bestellung für Tisch ${currentSelectedTable} gesendet (#${orderNumber})`);
            
            const now = Date.now();
            cart = cart.map(item => {
                if(item.active) {
                    return { ...item, active: false, lastSent: now, isOldItem: true };
                }
                return item;
            });
            
            const stateToSave = cart.map(item => ({
                productId: item.productId,
                name: item.name,
                basePrice: item.basePrice,
                customText: item.customText,
                extras: Array.isArray(item.extras) ? item.extras : [],
                zutaten: Array.isArray(item.zutaten) ? item.zutaten : [],
                priceModifier: item.priceModifier || 0,
                totalPrice: item.totalPrice,
                imageUrl: item.imageUrl,
                active: false,
                isOldItem: true,
                lastSent: item.lastSent || null
            }));
            await set(ref(db, `tableStates/${currentSelectedTable}`), {
                items: cleanForFirebase(stateToSave),
                lastUpdate: Date.now()
            });
            
            renderCart();
            showToast("Bestellung gesendet. Die Elemente wurden zur Tabelle hinzugefügt.");
            exitTableMode(true);
        } else {
            if(cart.length === 0) { showToast("Warenkorb ist leer", true); return; }
            openTableSelectionForNewOrder();
        }
    };
    
    function openTableSelectionForNewOrder() {
        const grid = document.getElementById("tablesGrid");
        grid.innerHTML = "";
        for(let i=1;i<=20;i++) {
            const btn = document.createElement("div");
            btn.className = `table-btn ${occupiedTables.has(i) ? "table-disabled" : ""}`;
            btn.innerText = i;
            if(!occupiedTables.has(i)) btn.onclick = () => sendNewOrder(i);
            grid.appendChild(btn);
        }
        document.getElementById("tablesSelectionModal").style.display = "flex";
        document.getElementById("takeawayBtn").onclick = () => sendNewOrder("takeaway");
    }
    
    async function sendNewOrder(table) {
        const orderNumber = await getNextOrderNumber();
        const cleanCart = cart.map(item => cleanForFirebase(item));
        const order = { 
            table, 
            items: cleanCart, 
            timestamp: Date.now(), 
            status: "new",
            orderNumber: orderNumber
        };
        const cleanedOrder = cleanForFirebase(order);
        const newOrderRef = push(ref(db, 'orders'));
        await set(newOrderRef, cleanedOrder);
        // 🔔 إشارة الجرس
        await set(ref(db, 'sounds/ring'), true);
        cart = [];
        renderCart();
        document.getElementById("tablesSelectionModal").style.display = "none";
        showToast(`Bestellung an ${table === "takeaway" ? "Takeaway" : "Tisch "+table} gesendet (#${orderNumber})`);
    }
    
    document.getElementById("transferTableBtn").onclick = async () => {
        if(!currentSelectedTable) return;
        openTableTransferModal();
    };
    
    function openTableTransferModal() {
        const grid = document.getElementById("tablesGrid");
        grid.innerHTML = "";
        for(let i=1;i<=20;i++) {
            const btn = document.createElement("div");
            btn.className = `table-btn ${occupiedTables.has(i) && i !== currentSelectedTable ? "table-disabled" : ""}`;
            btn.innerText = i;
            if(!occupiedTables.has(i) || i === currentSelectedTable) {
                btn.onclick = async () => {
                    const newTable = i;
                    const snapshot = await get(ref(db, 'orders'));
                    const data = snapshot.val();
                    if(data) {
                        for(let [id, order] of Object.entries(data)) {
                            if(order.table == currentSelectedTable && order.status !== "completed") {
                                await update(ref(db, `orders/${id}`), { table: newTable });
                            }
                        }
                    }
                    const stateRef = ref(db, `tableStates/${currentSelectedTable}`);
                    const stateSnap = await get(stateRef);
                    if(stateSnap.exists()) {
                        await set(ref(db, `tableStates/${newTable}`), stateSnap.val());
                        await set(stateRef, null);
                    }
                    currentSelectedTable = newTable;
                    updateUITableMode(true, newTable);
                    showToast(`Tisch gewechselt zu ${newTable}`);
                    closeAllModals();
                    exitTableMode(true);
                };
            }
            grid.appendChild(btn);
        }
        document.getElementById("takeawayBtn").onclick = async () => {
            const snapshot = await get(ref(db, 'orders'));
            const data = snapshot.val();
            if(data) {
                for(let [id, order] of Object.entries(data)) {
                    if(order.table == currentSelectedTable && order.status !== "completed") {
                        await update(ref(db, `orders/${id}`), { table: "takeaway" });
                    }
                }
            }
            const stateRef = ref(db, `tableStates/${currentSelectedTable}`);
            await set(stateRef, null);
            currentSelectedTable = "takeaway";
            updateUITableMode(true, "Takeaway");
            showToast("Tisch zu Takeaway gewechselt");
            closeAllModals();
            exitTableMode(true);
        };
        document.getElementById("tablesSelectionModal").style.display = "flex";
    }
    
    document.getElementById("cancelTableBtn").onclick = async () => {
        if(!currentSelectedTable) return;
        if(confirm("Tisch wirklich aufheben? Alle offenen Bestellungen werden abgeschlossen.")) {
            await set(ref(db, `tableStates/${currentSelectedTable}`), null);
            const snapshot = await get(ref(db, 'orders'));
            const data = snapshot.val();
            if(data) {
                for(let [id, order] of Object.entries(data)) {
                    if(order.table == currentSelectedTable && order.status !== "completed") {
                        await update(ref(db, `orders/${id}`), { status: "completed" });
                    }
                }
            }
            exitTableMode(true);
            showToast("Tisch aufgehoben");
        }
    };
    
    document.getElementById("saveTableChangesBtn").onclick = async () => {
        if(!currentSelectedTable) { showToast("Keine Tabelle ausgewählt", true); return; }
        const stateToSave = cart.map(item => ({
            productId: item.productId,
            name: item.name,
            basePrice: item.basePrice,
            customText: item.customText,
            extras: Array.isArray(item.extras) ? item.extras : [],
            zutaten: Array.isArray(item.zutaten) ? item.zutaten : [],
            priceModifier: item.priceModifier || 0,
            totalPrice: item.totalPrice,
            imageUrl: item.imageUrl,
            active: item.active,
            isOldItem: item.isOldItem,
            lastSent: item.lastSent || null
        }));
        await set(ref(db, `tableStates/${currentSelectedTable}`), {
            items: cleanForFirebase(stateToSave),
            lastUpdate: Date.now()
        });
        showToast("Tabellenstatus gespeichert");
        exitTableMode(true);
    };
    
    document.getElementById("groupsBtn").onclick = () => {
        const dd = document.getElementById("groupDropdown");
        const tablesDD = document.getElementById("tablesDropdown");
        if(dd.style.display === "block") dd.style.display = "none";
        else { dd.style.display = "block"; tablesDD.style.display = "none"; }
    };
    document.getElementById("tablesBtn").onclick = async () => {
        const dd = document.getElementById("tablesDropdown");
        const groupsDD = document.getElementById("groupDropdown");
        if(dd.style.display === "block") dd.style.display = "none";
        else { await renderTablesDropdown(); dd.style.display = "block"; groupsDD.style.display = "none"; }
    };
    document.addEventListener("click", (e) => {
        const groupsBtn = document.getElementById("groupsBtn");
        const tablesBtn = document.getElementById("tablesBtn");
        const groupsDD = document.getElementById("groupDropdown");
        const tablesDD = document.getElementById("tablesDropdown");
        if(!groupsBtn.contains(e.target) && !groupsDD.contains(e.target)) groupsDD.style.display = "none";
        if(!tablesBtn.contains(e.target) && !tablesDD.contains(e.target)) tablesDD.style.display = "none";
    });
    
    document.getElementById("overlay").onclick = () => { document.getElementById("sideMenu").style.left = "-280px"; document.getElementById("overlay").style.display = "none"; };
    document.getElementById("hamburgerBtn").onclick = () => { document.getElementById("sideMenu").style.left = "0"; document.getElementById("overlay").style.display = "block"; };
    document.querySelectorAll(".side-menu a").forEach(link => {
        link.addEventListener("click", (e) => {
            let page = link.dataset.page;
            // إذا كان الرابط لـ Kunden display، نسمح بالانتقال العادي
            if (link.getAttribute("href") === "kunden_display.html") {
                return; // لا نمنع الانتقال
            }
            e.preventDefault();
            if(page === "admin") window.location.href = "admin.html";
            else if(page === "kueche") window.location.href = "kueche.html";
            else showToast(`Seite ${page} kommt bald`);
        });
    });
    
    const ordersListener = ref(db, 'orders');
    onValue(ordersListener, (snapshot) => {
        const data = snapshot.val();
        occupiedTables.clear();
        if(data) {
            Object.values(data).forEach(order => {
                let t = order.table;
                if(t !== "takeaway" && !isNaN(parseInt(t)) && order.status !== "completed") occupiedTables.add(parseInt(t));
            });
        }
    });
</script>
</body>
</html>
