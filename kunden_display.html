<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kunden Display - Die Primel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }
        .price-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            display: none;
        }
        .price-card {
            background: white;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            border-radius: 48px;
            padding: 24px;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .price-card h2 {
            text-align: center;
            color: #2d6a4f;
            margin-bottom: 20px;
            font-size: 1.8rem;
            border-bottom: 2px solid #d4a373;
            padding-bottom: 10px;
        }
        .cart-items-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }
        .cart-item-card {
            background: #f8f9fa;
            border-radius: 24px;
            padding: 12px 16px;
            border-left: 5px solid #d4a373;
        }
        .item-name {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .item-price {
            font-weight: bold;
            color: #b4430c;
            margin-top: 4px;
        }
        .item-custom-text {
            color: #c1121f;
            font-size: 0.85rem;
            margin-top: 6px;
            padding-left: 8px;
            border-left: 3px solid #c1121f;
        }
        .item-extras, .item-zutaten {
            font-size: 0.8rem;
            margin-top: 4px;
            padding-left: 8px;
        }
        .item-extras span, .item-zutaten span {
            display: inline-block;
            background: #e0f2fe;
            padding: 2px 8px;
            border-radius: 20px;
            margin-right: 6px;
            margin-bottom: 4px;
            color: #1e6091;
        }
        .price-modifier {
            font-size: 0.8rem;
            background: #d4a373;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 4px;
        }
        .total-amount {
            text-align: right;
            font-size: 1.8rem;
            font-weight: bold;
            border-top: 2px solid #ccc;
            padding-top: 16px;
            margin-top: 8px;
            color: #2d6a4f;
        }
        @media (max-width: 600px) {
            .price-card {
                width: 95%;
                padding: 16px;
            }
            .total-amount {
                font-size: 1.3rem;
            }
            .price-card h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
<div id="background" class="background"></div>
<div id="priceOverlay" class="price-overlay">
    <div class="price-card">
        <h2>📋 Ihre Bestellung</h2>
        <div id="cartItemsList" class="cart-items-list">Wird geladen...</div>
        <div id="totalAmount" class="total-amount"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyAEupmyQlU5MK_tRDIlJpjwryKU0nHpjQk",
        authDomain: "die-primel-orderapp.firebaseapp.com",
        databaseURL: "https://die-primel-orderapp-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "die-primel-orderapp",
        storageBucket: "die-primel-orderapp.firebasestorage.app",
        messagingSenderId: "781155000962",
        appId: "1:781155000962:web:93f9a6aa03d4e77d358a9b"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let currentCart = [];
    let overlayVisible = false;
    
    function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;';
            if(m==='<') return '&lt;';
            if(m==='>') return '&gt;';
            return m;
        });
    }
    
    // تحميل الخلفية من Firebase
    async function loadBackground() {
        const bgRef = ref(db, 'settings/kundenBackground');
        const snapshot = await get(bgRef);
        if (snapshot.exists()) {
            const url = snapshot.val();
            document.getElementById("background").style.backgroundImage = `url('${url}')`;
        } else {
            document.getElementById("background").style.background = "#2d6a4f";
        }
    }
    
    // عرض العناصر في النافذة العائمة
    function renderCartOverlay() {
        const container = document.getElementById("cartItemsList");
        const totalDiv = document.getElementById("totalAmount");
        
        if (!currentCart || currentCart.length === 0) {
            container.innerHTML = "<p style='text-align:center; color:#666;'>Der Warenkorb ist leer</p>";
            totalDiv.innerHTML = "";
            return;
        }
        
        let total = 0;
        let itemsHtml = "";
        
        currentCart.forEach((item) => {
            // فقط العناصر المفعلة (active === true)
            if (item.active !== true) return;
            
            let extrasTotal = (item.extras || []).reduce((s,e)=>s+(parseFloat(e.price)||0),0);
            let zutatenTotal = (item.zutaten || []).reduce((s,z)=>s+(parseFloat(z.price)||0),0);
            let priceModifier = item.priceModifier || 0;
            let itemTotal = (item.basePrice || 0) + priceModifier + extrasTotal + zutatenTotal;
            total += itemTotal;
            
            let priceModifierHtml = "";
            if (item.priceModifier && item.priceModifier !== 0) {
                const modifierText = item.priceModifier > 0 ? `Preiserhöhung +${item.priceModifier.toFixed(2)}€` : `Preisrabatt ${item.priceModifier.toFixed(2)}€`;
                priceModifierHtml = `<div class="price-modifier">💰 ${modifierText}</div>`;
            }
            
            let customHtml = "";
            if (item.customText) {
                customHtml = `<div class="item-custom-text">📝 ${escapeHtml(item.customText)}</div>`;
            }
            
            let extrasHtml = "";
            if (item.extras && item.extras.length) {
                extrasHtml = `<div class="item-extras">${item.extras.map(ex => `<span>➕ ${escapeHtml(ex.name)} +${ex.price}€</span>`).join('')}</div>`;
            }
            
            let zutatenHtml = "";
            if (item.zutaten && item.zutaten.length) {
                zutatenHtml = `<div class="item-zutaten">${item.zutaten.map(z => `<span>🧂 ${escapeHtml(z.name)} +${z.price}€</span>`).join('')}</div>`;
            }
            
            itemsHtml += `
                <div class="cart-item-card">
                    <div class="item-name">${escapeHtml(item.name)}</div>
                    <div class="item-price">${itemTotal.toFixed(2)} €</div>
                    ${priceModifierHtml}
                    ${customHtml}
                    ${extrasHtml}
                    ${zutatenHtml}
                </div>
            `;
        });
        
        container.innerHTML = itemsHtml;
        totalDiv.innerHTML = `Gesamt: ${total.toFixed(2)} €`;
    }
    
    // الاستماع لتغييرات السلة بشكل لحظي
    const cartRef = ref(db, 'cart/current');
    onValue(cartRef, (snapshot) => {
        if (snapshot.exists()) {
            currentCart = snapshot.val();
        } else {
            currentCart = [];
        }
        // إذا كانت النافذة مفتوحة، حدث العرض
        if (overlayVisible) {
            renderCartOverlay();
        }
    });
    
    // الاستماع لإشارة إظهار الأسعار
    const showPricesRef = ref(db, 'settings/showPricesForKunden');
    onValue(showPricesRef, async (snapshot) => {
        const shouldShow = snapshot.val();
        if (shouldShow === true) {
            overlayVisible = true;
            document.getElementById("priceOverlay").style.display = "flex";
            renderCartOverlay();
            // لا نعيد تعيين الإشارة هنا، بل ننتظر حتى يتم إعادة تعيينها من index.html بعد 60 ثانية
        } else if (shouldShow === false && overlayVisible === true) {
            // إشارة الإغلاق
            overlayVisible = false;
            document.getElementById("priceOverlay").style.display = "none";
        }
    });
    
    // تحميل الخلفية عند بدء الصفحة
    loadBackground();
</script>
</body>
</html>
